version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: roomsathi
      POSTGRES_PASSWORD: root123
      POSTGRES_DB: roomsathi_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U roomsathi -d roomsathi_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads

volumes:
  postgres_data:
